name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Package Release App
    runs-on: macos-26
    permissions:
      contents: write # Required to create/update GitHub Releases and upload assets
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode (Tahoe SDK compatible)
        run: |
          # Dynamically locate and select Xcode 17 or Xcode 16 toolchain
          XCODE_PATH=$(find /Applications -maxdepth 1 \( -name "Xcode_17*.app" -o -name "Xcode_16*.app" \) | head -n 1)
          if [ -d "$XCODE_PATH" ]; then
            echo "Selecting Xcode from: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          else
            echo "Xcode specific path not found. Proceeding with default xcodebuild..."
          fi

      - name: Generate Version Info
        id: version_info
        run: |
          # Generate base version based on current date
          DATE_VERSION=$(date +"%y.%m.%d")
          BUILD_NUMBER=$(date +"%y%m%d%H%M")
          
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            # Extract version from tag (e.g. v26.05.26-beta.1 -> 26.05.26)
            VERSION_NAME=$(echo "$TAG_NAME" | sed -E 's/^v//' | cut -d'-' -f1)
            
            # Extract stage suffix (e.g. beta.1 or stable)
            STAGE_SUFFIX=$(echo "$TAG_NAME" | sed -E 's/^v//' | cut -d'-' -f2- -s)
            if [ -z "$STAGE_SUFFIX" ]; then
              RELEASE_STAGE="stable"
            else
              RELEASE_STAGE="$STAGE_SUFFIX"
            fi
          else
            # Sourced from main branch push
            VERSION_NAME="$DATE_VERSION"
            RELEASE_STAGE="alpha.${{ github.run_number }}"
            TAG_NAME="v${VERSION_NAME}-${RELEASE_STAGE}"
          fi
          
          # Write parameters to environment for subsequent steps
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "RELEASE_STAGE=${RELEASE_STAGE}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          
          echo "----------------------------------------"
          echo "Computed Version Parameters:"
          echo "Marketing Version:  $VERSION_NAME"
          echo "Build Number:       $BUILD_NUMBER"
          echo "Release Stage:      $RELEASE_STAGE"
          echo "----------------------------------------"

      - name: Verify Xcode Version
        run: xcodebuild -version

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: "temporary-keychain-password"
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "No code signing certificate secret found. Skipping certificate installation..."
            exit 0
          fi
          
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "Certificate successfully installed in temporary keychain."

      - name: Run Build Script (Release Mode)
        env:
          VERSION_NAME: ${{ env.VERSION_NAME }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          HAS_SECRET: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          # Ensure execution permission on script
          chmod +x ./scripts/build.sh
          
          if [ "$HAS_SECRET" = "true" ]; then
            export CODE_SIGN_IDENTITY="Developer ID Application: Rohan Harrison ($TEAM_ID)"
          fi
          
          ./scripts/build.sh release

      - name: Notarize, Staple, and Package App Bundle
        env:
          NOTARIZATION_USERNAME: ${{ secrets.NOTARIZATION_USERNAME }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          HAS_SECRET: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          APP_PATH="./build/Build/Products/Release/Chobi.app"
          ZIP_NAME="Chobi-v${{ env.VERSION_NAME }}-${{ env.RELEASE_STAGE }}.zip"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Built app not found at $APP_PATH"
            exit 1
          fi

          if [ "$HAS_SECRET" = "true" ]; then
            echo "Code signing secret detected. Starting Notarization and Stapling flow..."
            
            # 1. Create a temporary zip for notarization submission
            cd "./build/Build/Products/Release"
            zip -r "../../../../notarize_temp.zip" "Chobi.app"
            cd "../../../.."
            
            # 2. Submit to Apple Notary Service and wait for completion
            echo "Submitting to Apple Notary Service..."
            xcrun notarytool submit notarize_temp.zip \
              --apple-id "$NOTARIZATION_USERNAME" \
              --password "$NOTARIZATION_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
            
            # 3. Staple the ticket directly to the built app bundle
            echo "Stapling notarization ticket to Chobi.app..."
            xcrun stapler staple "$APP_PATH"
            
            # 4. Create the final distribution zip containing the stapled app
            echo "Packaging stapled Chobi.app into final distribution zip: $ZIP_NAME..."
            cd "./build/Build/Products/Release"
            zip -r "../../../../$ZIP_NAME" "Chobi.app"
            cd "../../../.."
            
            # Clean up temporary zip
            rm notarize_temp.zip
          else
            echo "No code signing secret found. Packaging ad-hoc signed app without notarization..."
            cd "./build/Build/Products/Release"
            zip -r "../../../../$ZIP_NAME" "Chobi.app"
            cd "../../../.."
          fi
          echo "Packaging complete!"

      - name: Upload Actions Run Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chobi-v${{ env.VERSION_NAME }}-${{ env.RELEASE_STAGE }}
          path: Chobi-v${{ env.VERSION_NAME }}-${{ env.RELEASE_STAGE }}.zip
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_NAME="Chobi-v${{ env.VERSION_NAME }}-${{ env.RELEASE_STAGE }}.zip"
          
          # Determine if this is a pre-release build
          PRERELEASE_FLAG=""
          if [[ "${{ env.RELEASE_STAGE }}" == *"alpha"* || "${{ env.RELEASE_STAGE }}" == *"beta"* ]]; then
            PRERELEASE_FLAG="--prerelease"
            echo "Publishing as a Pre-Release..."
          else
            echo "Publishing as a Stable Release..."
          fi
          
          # Create official GitHub release and attach zip package
          # --generate-notes automatically builds a beautiful changelog from commits
          gh release create "${{ env.TAG_NAME }}" \
            --title "Chobi ${{ env.TAG_NAME }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "$ZIP_NAME"
          
          echo "Successfully created GitHub Release and uploaded $ZIP_NAME!"
